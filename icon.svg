<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080c10"/>
      <stop offset="100%" style="stop-color:#0f1520"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4a0"/>
      <stop offset="100%" style="stop-color:#00ff88"/>
    </linearGradient>
  </defs>
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>
  <!-- Accent bar top -->
  <rect x="0" y="0" width="512" height="8" rx="4" fill="url(#acc)"/>
  <!-- Football oval -->
  <ellipse cx="256" cy="188" rx="110" ry="70" fill="none" stroke="#00d4a0" stroke-width="14" opacity="0.5"/>
  <!-- Laces -->
  <line x1="256" y1="120" x2="256" y2="256" stroke="#00d4a0" stroke-width="8" opacity="0.4"/>
  <line x1="230" y1="154" x2="282" y2="154" stroke="#00d4a0" stroke-width="6" opacity="0.4"/>
  <line x1="228" y1="174" x2="284" y2="174" stroke="#00d4a0" stroke-width="6" opacity="0.4"/>
  <line x1="230" y1="194" x2="282" y2="194" stroke="#00d4a0" stroke-width="6" opacity="0.4"/>
  <!-- TAB text -->
  <text x="256" y="390" 
        font-family="'Arial Black', Arial, sans-serif" 
        font-size="130" font-weight="900" 
        text-anchor="middle" 
        fill="url(#acc)" 
        letter-spacing="-4">TAB</text>
  <!-- Subtitle -->
  <text x="256" y="440" 
        font-family="Arial, sans-serif" 
        font-size="36" font-weight="400" 
        text-anchor="middle" 
        fill="rgba(255,255,255,0.35)"
        letter-spacing="8">DRAFT 2026</text>
</svg>